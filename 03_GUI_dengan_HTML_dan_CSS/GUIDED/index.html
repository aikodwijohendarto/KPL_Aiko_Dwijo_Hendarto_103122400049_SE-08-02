<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPL REVAL</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>

    <div class="container">
        <h1>Pemeriksa Teks</h1>
        <p>Masukkan teks lalu klik tombol cek untuk melihat hasilnya.</p>

        <div class="input-group">
            <label for="editor-kecil">Masukkan teks:</label>
            <textarea class="kotak-input" id="editor-kecil" rows="10" cols="60" placeholder="Kata-kata..."></textarea>
        </div>

        <p>
            Huruf: <span id="hf">0</span>, 
            huruf besar: <span id="hb">0</span>, 
            huruf kecil: <span id="hk">0</span>
        </p>

        <div class="button-group">
            <button id="cek-teks">Cek Teks</button>
        </div>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <img src="https://tenor.com/view/umamusume-haru-urara-umazing-anime-gif-1193222197980579467.gif" alt="success">
            <p>Teks berhasil dicek, bisa tutup dan lihat hasilnya</p>
            <button id="tutup">Tutup</button>
        </div>
    </div>

<script src="./index.js"></script>
</body>
</html>
